per"},"chapterStart":false},"right":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":67,"body":"Snowdrop taught the kittens to listen to rain on the roof, bees in the flowers, wings in the bushes, and the soft warning sound grown cats made when a game became too rough.\n\nPearl loved listening to the garden.\n\n\"The grass whispers,\" she said.\n\n\"The fence creaks,\" said Mist.\n\n\"Marmalade snores,\" said Pearl.\n\n\"I do not snore,\" said Marmalade, waking himself up with a snort.\n\nThe kittens laughed so hard they rolled against each other."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false}},{"type":"spread","label":"Chapter Nine: Quiet Beside Pepper","left":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":68,"body":"Marmalade looked embarrassed, so Pearl climbed carefully onto his paw and whispered, \"Your snore is cozy.\"\n\nMarmalade smiled.\n\nSnowdrop smiled too.\n\nLater, Poppy showed the kittens how to listen for the flutter of wings before a bird appeared on the wall.\n\nClover showed them how a dry leaf made different sounds on stone, grass, and blanket.\n\nPepper showed them nothing on purpose, but Mist copied the way he tilted one ear toward far-off footsteps."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false},"right":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":69,"body":"The kittens began to know the garden by sound.\n\nBuzz meant bees.\n\nTap meant a beetle on the water bowl.\n\nScritch meant Clover was moving her leaf.\n\nThump meant Marmalade had rolled over.\n\nSilence could mean many things.\n\nIt could mean Pepper was thinking.\n\nIt could mean Poppy had seen something from the fence.\n\nIt could mean Pearl had put both front paws into the water bowl and was waiting to see who noticed.\n\nSnowdrop usually noticed."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false}},{"type":"spread","label":"Chapter Nine: Quiet Beside Pepper","left":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":70,"body":"One quiet afternoon, Snowdrop pretended not to notice for three whole breaths.\n\nPearl stood in the bowl with wet paws and a very serious face.\n\nMist stood beside her, not in the bowl, but clearly considering it.\n\n\"Why is water cold?\" Pearl asked.\n\n\"Because it is not sun,\" said Marmalade.\n\n\"That is not an answer,\" said Pepper.\n\n\"It is a Marmalade answer,\" said Poppy.\n\nSnowdrop lifted Pearl out and dried her paws.\n\n\"Cold water belongs in the bowl,\" she said."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false},"right":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":71,"body":"Mist liked to practice sitting still with Pepper.\n\nAt first, he lasted three blinks.\n\nThen five.\n\nThen long enough for an ant to cross a stone.\n\nPearl tried too, but sitting still made more questions climb into her mouth.\n\n\"Why do ants carry crumbs?\"\n\n\"Why do crumbs break?\"\n\n\"Why does Marmalade always know when someone says crumbs?\"\n\nMarmalade opened one eye. \"I have a gift.\"\n\nPepper closed both eyes.\n\nSnowdrop pressed her whiskers together so she would not laugh."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false}},{"type":"spread","label":"Chapter Nine: Quiet Beside Pepper","left":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":72,"body":"That evening, the garden played a quiet game.\n\nPoppy dropped a pebble into a flowerpot.\n\nPlink.\n\nClover dragged the leopard-tail leaf across a stone.\n\nScritch.\n\nMarmalade tapped his tail.\n\nThump.\n\nPepper flicked his one white paw against the fence.\n\nTock.\n\nMist and Pearl listened with their ears high.\n\nThen Snowdrop asked, \"What did you hear?\"\n\nPearl answered first. \"Everyone.\""},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false},"right":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":73,"body":"Mist began to hear when Pearl was about to tumble.\n\nThere was a tiny skid sound before it happened.\n\nPearl began to hear when Mist was about to climb.\n\nThere was a tiny determined huff before he put his paw up.\n\nSnowdrop heard both sounds.\n\nSometimes she stopped the tumble or the climb.\n\nSometimes she let the kittens try, if the landing was soft and the height was small.\n\nLearning was not only stopping.\n\nLearning was also watching close."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false}},{"type":"spread","label":"Chapter Nine: Quiet Beside Pepper","left":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":74,"body":"Frost visited again near sunset.\n\nMist showed her how long he could sit beside Pepper.\n\nPearl showed her how the floorboard sang.\n\nFrost listened to every sound as if it mattered.\n\n\"They are steadier,\" she said.\n\n\"Most of the time,\" Snowdrop answered.\n\nPearl stepped on the floorboard.\n\nEek-eek.\n\nMist stepped after her.\n\nEeek.\n\nFrost's eyes softened.\n\n\"Most of the time is a good beginning.\""},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false},"right":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":75,"body":"When Frost left, the kittens did not cry.\n\nPearl watched until Frost disappeared behind the lavender.\n\nMist leaned against Snowdrop's leg.\n\n\"Back?\" he asked.\n\n\"Yes,\" said Snowdrop. \"She comes back.\"\n\nPearl looked up. \"Why does going away feel funny?\"\n\nSnowdrop thought before answering.\n\n\"Because you like who left.\"\n\nPearl pressed against Snowdrop's other side.\n\nThe lavender shadows grew long around all three of them."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false}},{"type":"spread","label":"Chapter Nine: Quiet Beside Pepper","left":{"type":"story","label":"Chapter Nine: Quiet Beside Pepper","page":{"number":76,"body":"That night, Snowdrop slept deeply for the first time since Frost had arrived with the kittens.\n\nShe woke once when Mist sneezed.\n\nShe woke again when Pearl asked the dark why it was dark.\n\nThen morning came, pink and quiet.\n\nThe kittens tumbled toward the doorway.\n\n\"Outside?\" asked Mist.\n\n\"Outside,\" said Snowdrop.\n\nThe garden waited beyond the lavender.\n\nSo did the lane.\n\nAnd the gate was open just a little."},"chapter":{"label":"Chapter Nine","title":"Quiet Beside Pepper","startPage":65,"scene":{"image":"quiet-beside-pepper.png","title":"Quiet Beside Pepper","caption":"Mist learns to sit quietly beside Pepper."},"displayTitle":"Chapter Nine: Quiet Beside Pepper"},"chapterStart":false},"right":{"type":"blank","label":""}},{"type":"spread","label":"Chapter Ten: Beyond the Lavender","left":{"type":"illustration","label":"Chapter Ten: Beyond the Lavender","scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"targetPageNumber":77},"right":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":77,"body":"By the time Mist and Pearl were five weeks old, they wanted to explore everything.\n\nThey wanted to know what was behind the flowerpots, under the bench, inside the hollow log, and beyond the garden gate.\n\n\"Wanting to know things is good,\" Snowdrop told them. \"It helps you learn. But questions still need careful paws.\"\n\n\"Is Caution a cat?\" asked Pearl.\n\n\"Today, Caution is me,\" said Snowdrop.\n\nShe led them on their first tiny expedition beyond the lavender bushes."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":true}},{"type":"spread","label":"Chapter Ten: Beyond the Lavender","left":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":78,"body":"Marmalade guarded the back.\n\nPepper checked the shadows.\n\nPoppy pointed out safe stepping stones.\n\nClover carried a new leopard-tail leaf in case a proper expedition needed a proper flag.\n\nBeyond the lavender, the lane smelled different.\n\nThere was warm dust, old wood, dry grass, and the sharp green smell of crushed leaves.\n\nMist sniffed so hard he sneezed.\n\nPearl found a trail of ants and crouched low to watch them carry crumbs."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false},"right":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":79,"body":"\"Where are they going?\" Pearl asked.\n\n\"Home, probably,\" said Poppy.\n\n\"Do ants have blankets?\" asked Pearl.\n\n\"Maybe tiny ones,\" said Clover.\n\nMist started to put one paw in the ant trail, then stopped.\n\n\"Would that scare them?\"\n\nSnowdrop touched his ear with her nose. \"That was a careful question.\"\n\nMist pulled his paw back and watched instead.\n\nThe ants walked around a crumb, over a twig, and past the shadow of his paw."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false}},{"type":"spread","label":"Chapter Ten: Beyond the Lavender","left":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":80,"body":"Farther down the lane, a hollow log rested beside the fence.\n\nPearl wanted to look inside.\n\nMist wanted to climb on top.\n\nMarmalade wanted to know whether anyone had left breakfast in it.\n\nSnowdrop sniffed the opening first.\n\nIt smelled of old wood, damp leaves, and nothing sharp.\n\n\"One at a time,\" she said.\n\nPearl peeked in.\n\n\"Dark,\" she whispered.\n\nMist climbed halfway up the side and slid down into a pile of leaves.\n\n\"Soft,\" he said."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false},"right":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":81,"body":"The pile of leaves was softer than it looked.\n\nMist rolled once and came up with a brown leaf stuck to his gray patch.\n\nPearl laughed so hard she hiccuped.\n\nClover inspected the leaf.\n\n\"Not a leopard tail,\" she said. \"Too round.\"\n\nPoppy brushed it off Mist's head.\n\nPepper watched the fence line.\n\nSnowdrop noticed how the group moved around the kittens now: one cat looking, one cat guiding, one cat making jokes, one cat carrying a leaf."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false}},{"type":"spread","label":"Chapter Ten: Beyond the Lavender","left":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":82,"body":"At the bend in the lane, the wind pushed a crumpled paper scrap across the dust.\n\nPearl gasped. \"It runs!\"\n\nMist chased it two steps before Snowdrop's tail blocked him.\n\n\"We watch first,\" Snowdrop said.\n\nThe paper flipped, fluttered, and caught on a weed.\n\nPearl crept closer.\n\n\"Is it alive?\"\n\nPepper sniffed it. \"No.\"\n\nMarmalade sniffed it too. \"Also not breakfast.\"\n\nClover tapped it with the leopard-tail leaf, just to be sure."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false},"right":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":83,"body":"The expedition took longer than Snowdrop expected.\n\nEvery pebble needed a question. Every crack in the path needed inspection. Every weed seemed to have a story Pearl wanted to hear.\n\nMist practiced climbing only the low things.\n\nPearl practiced asking before touching anything that buzzed, skittered, or looked like it might be someone else's treasure.\n\nSnowdrop practiced saying, \"Wait,\" without sounding worried.\n\nShe did not always succeed.\n\nMarmalade said she sounded like a very polite bell."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false}},{"type":"spread","label":"Chapter Ten: Beyond the Lavender","left":{"type":"story","label":"Chapter Ten: Beyond the Lavender","page":{"number":84,"body":"On the way back, Clover's new leopard-tail leaf caught under Mist's paw.\n\nMist did not mean to step on it.\n\nPearl did not mean to bump into Mist.\n\nClover did not mean to tug so hard.\n\nBut all three things happened at once.\n\nThe leaf tore in half.\n\nClover's eyes filled with tears.\n\nFor a moment, the lane was silent.\n\nMist looked at the torn leaf.\n\nPearl looked at Clover.\n\nSnowdrop waited."},"chapter":{"label":"Chapter Ten","title":"Beyond the Lavender","startPage":77,"scene":{"image":"expedition.png","title":"Beyond the Lavender","caption":"Questions and careful paws walk together."},"displayTitle":"Chapter Ten: Beyond the Lavender"},"chapterStart":false},"right":{"type":"blank","label":""}},{"type":"spread","label":"Chapter Eleven: Twin Leopard Tails","left":{"type":"illustration","label":"Chapter Eleven: Twin Leopard Tails","scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"targetPageNumber":85},"right":{"type":"story","label":"Chapter Eleven: Twin Leopard Tails","page":{"number":85,"body":"\"I did it,\" Pearl whispered. \"I am sorry.\"\n\nMist lowered his ears. \"Me too.\"\n\nClover sniffed. \"It was my best leopard tail.\"\n\nPearl pushed one half of the leaf toward Clover and kept the other half near her own paws.\n\n\"Can it be two leopard tails?\"\n\nClover thought about this.\n\nThe leaf halves curled on the dusty path.\n\n\"Twin leopard tails,\" Clover said at last.\n\nMist nudged his half closer.\n\n\"For two captains,\" he said."},"chapter":{"label":"Chapter Eleven","title":"Twin Leopard Tails","startPage":85,"scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"displayTitle":"Chapter Eleven: Twin Leopard Tails"},"chapterStart":true}},{"type":"spread","label":"Chapter Eleven: Twin Leopard Tails","left":{"type":"story","label":"Chapter Eleven: Twin Leopard Tails","page":{"number":86,"body":"Clover liked that.\n\nShe gave one half to Pearl and one half to Mist, but only until they reached the garden.\n\n\"Captains must carry carefully,\" she said.\n\nPearl carried her half in her mouth.\n\nMist carried his and walked so proudly that he nearly tripped over his own feet.\n\nSnowdrop walked beside them.\n\nThe lane felt less big on the way home.\n\nThe lavender bushes appeared ahead like purple flags.\n\nHome smelled sweet and familiar."},"chapter":{"label":"Chapter Eleven","title":"Twin Leopard Tails","startPage":85,"scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"displayTitle":"Chapter Eleven: Twin Leopard Tails"},"chapterStart":false},"right":{"type":"story","label":"Chapter Eleven: Twin Leopard Tails","page":{"number":87,"body":"Back in the garden, the kittens showed everyone their leaf halves as if they had returned from the far side of the world.\n\nPoppy admired them.\n\nMarmalade asked if captains still took naps.\n\nPepper said good captains did.\n\nClover placed the two halves side by side near the sunny stone.\n\n\"They match,\" Pearl said.\n\n\"They used to be one thing,\" said Mist.\n\n\"Now they are two things,\" said Clover.\n\nSnowdrop watched Pearl lean against Clover's shoulder.\n\nThat helped too."},"chapter":{"label":"Chapter Eleven","title":"Twin Leopard Tails","startPage":85,"scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"displayTitle":"Chapter Eleven: Twin Leopard Tails"},"chapterStart":false}},{"type":"spread","label":"Chapter Eleven: Twin Leopard Tails","left":{"type":"story","label":"Chapter Eleven: Twin Leopard Tails","page":{"number":88,"body":"That night, Mist and Pearl slept hard.\n\nTheir paws twitched with lane dreams.\n\nSnowdrop sat by the round window and thought about the open gate, the ants, the hollow log, the paper scrap, and the torn leaf.\n\nThe world outside the lavender was larger than the garden.\n\nThe kittens were larger than they had been.\n\nNot large.\n\nNot yet.\n\nBut larger.\n\nSnowdrop rested her chin on her paws.\n\nTomorrow would bring more questions."},"chapter":{"label":"Chapter Eleven","title":"Twin Leopard Tails","startPage":85,"scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"displayTitle":"Chapter Eleven: Twin Leopard Tails"},"chapterStart":false},"right":{"type":"story","label":"Chapter Eleven: Twin Leopard Tails","page":{"number":89,"body":"By the time Mist and Pearl were six weeks old, they could run.\n\nNot far.\n\nNot straight.\n\nNot always on purpose.\n\nBut they could run.\n\nThey raced from the blanket to the doorway, from the doorway to the lavender, from the lavender to Marmalade's sunny stone, and from Marmalade's sunny stone straight into Marmalade.\n\n\"Oof,\" said Marmalade.\n\n\"Sorry!\" squeaked Mist.\n\n\"Sorry!\" squeaked Pearl.\n\nMarmalade rolled onto his back. \"If I am going to be a finish line, I require payment.\""},"chapter":{"label":"Chapter Eleven","title":"Twin Leopard Tails","startPage":85,"scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"displayTitle":"Chapter Eleven: Twin Leopard Tails"},"chapterStart":false}},{"type":"spread","label":"Chapter Eleven: Twin Leopard Tails","left":{"type":"story","label":"Chapter Eleven: Twin Leopard Tails","page":{"number":90,"body":"\"What payment?\" asked Mist.\n\n\"One nap,\" said Marmalade. \"Beside me. Immediately.\"\n\nThe kittens paid him double.\n\nAfter the nap, Poppy set up a race from the flowerpot to the short grass.\n\nPepper was the judge.\n\nClover waved one half of the leopard-tail leaf as a flag.\n\nSnowdrop stood where the path curved, ready to guide any kitten who forgot how turning worked.\n\nMist ran fast.\n\nPearl ran wiggly.\n\nThey both arrived laughing."},"chapter":{"label":"Chapter Eleven","title":"Twin Leopard Tails","startPage":85,"scene":{"image":"twin-leopard-tails.png","title":"Twin Leopard Tails","caption":"A torn leaf becomes two treasures for careful captains."},"displayTitle":"Chapter Eleven: Twin Leopard Tails"},"chapterStart":false},"right":{"type":"blank","label":""}},{"type":"spread","label":"Chapter Twelve: Two Months Old","left":{"type":"illustration","label":"Chapter Twelve: Two Months Old","scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"targetPageNumber":91},"right":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":91,"body":"A windy afternoon shook the garden until leaves spun across the path.\n\nThe shed roof creaked. The lavender bent and sprang back. The round window rattled in its frame.\n\nPearl did not like the wind. It pushed her whiskers the wrong way.\n\n\"I do not want to go outside,\" she said.\n\nMist puffed up his chest. \"I am not scared.\"\n\nBut his amber eyes kept sliding toward the rattling window.\n\nSnowdrop lay down between them.\n\n\"You do not have to pretend,\" she said."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":true}},{"type":"spread","label":"Chapter Twelve: Two Months Old","left":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":92,"body":"\"You can say, 'I am scared, but I will try with someone beside me,'\" Snowdrop told them.\n\nSo they tried together.\n\nSnowdrop walked first. Mist pressed against one side, and Pearl pressed against the other.\n\nOutside, the wind was wild but wonderful.\n\nIt sent leaves skittering like little brown mice. It rolled a round seedpod across the path. It made the lavender bushes bow and whisper.\n\nPearl's green eyes grew wide.\n\n\"The wind is invisible,\" she said. \"But it still moves things.\""},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false},"right":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":93,"body":"Mist batted gently at a tumbling leaf.\n\n\"Like a hidden cat,\" he said.\n\nThe wind puffed through Snowdrop's white fur. She watched the kittens sniff, study, and wonder.\n\nThey were still small, but they were learning how to be careful without stopping their questions.\n\nThat was a good kind of growing.\n\nWhen the wind pushed too hard, Pearl stepped behind Snowdrop.\n\nWhen it softened, she stepped out again.\n\nSnowdrop did not hurry her."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false}},{"type":"spread","label":"Chapter Twelve: Two Months Old","left":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":94,"body":"When Mist and Pearl were seven weeks old, Frost visited again.\n\nShe found them in the garden with Snowdrop.\n\nMist was showing Pepper how he could hop over a stick. Pearl was showing Poppy a pebble shaped almost like a heart. Clover was teaching both kittens how to drag a leaf without stepping on it.\n\nFrost watched quietly for a long moment.\n\n\"They are changing,\" she said.\n\nSnowdrop nodded. \"They ask more questions now.\"\n\n\"And?\"\n\n\"They listen to the answers,\" said Snowdrop. \"Most of the time.\""},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false},"right":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":95,"body":"Pearl ran over and pressed the heart-shaped pebble near Frost's paw.\n\n\"This is for you because you looked tired.\"\n\nFrost's eyes softened.\n\nMist showed Frost how he could climb Marmalade Hill without using the tail.\n\nMarmalade looked proud of himself and of Mist.\n\nPepper showed Frost how Mist could sit beside him without pouncing.\n\nPoppy showed Frost the safe stepping stones.\n\nClover showed Frost the twin leopard tails.\n\nFrost looked at Snowdrop.\n\n\"You have all been busy.\""},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false}},{"type":"spread","label":"Chapter Twelve: Two Months Old","left":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":96,"body":"At last, Mist and Pearl were two months old.\n\nThey were still kittens, but they were no longer tiny wobbling bundles.\n\nMist could climb Marmalade Hill without using the tail.\n\nPearl could watch a bee without poking it.\n\nBoth kittens could ask questions, wait for answers, and notice when another cat needed kindness.\n\nFrost came at noon, just as she had on the day she first brought them.\n\nThe garden was bright. The lavender smelled sweet."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false},"right":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":97,"body":"The warm stone waited for Marmalade.\n\nThe fence waited for Poppy.\n\nThe shadows waited for Pepper.\n\nClover had found a leaf so grand she called it a royal leopard tail.\n\nSnowdrop stood in the doorway with Mist on one side and Pearl on the other.\n\nFrost nuzzled Mist, then Pearl, then Snowdrop.\n\n\"You took good care of them,\" she said.\n\nSnowdrop blinked once.\n\nThat meant, \"Of course.\"\n\nBut inside, Snowdrop felt bigger than before."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false}},{"type":"spread","label":"Chapter Twelve: Two Months Old","left":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":98,"body":"Not bigger like Marmalade after breakfast, and not taller like Poppy on the fence.\n\nBigger in the heart.\n\nShe had helped Mist and Pearl learn how to ask questions, listen closely, pounce, pause, and say, \"Are you all right?\"\n\nMist rubbed his gray and white cheek against Snowdrop's leg.\n\nPearl looked up with her green eyes.\n\n\"Can we still visit?\"\n\n\"Always,\" said Snowdrop.\n\nFrost smiled.\n\n\"Then this is not goodbye,\" she said.\n\n\"Good,\" said Pearl."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false},"right":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":99,"body":"That evening, the garden settled into purple shadows.\n\nMist and Pearl curled beside Frost in the warmest corner of the den. Marmalade slept by the doorway. Pepper slept with one eye barely open, just in case a pebble needed moving.\n\nPoppy tucked her nose under her tail.\n\nClover slept with one paw on the royal leopard-tail leaf.\n\nSnowdrop sat by the round window.\n\nThe lane was quiet. The lavender bushes were dark. The puddles outside reflected the moon.\n\nSnowdrop's blue eyes watched the garden.\n\nShe was watching over everyone."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false}},{"type":"spread","label":"Chapter Twelve: Two Months Old","left":{"type":"story","label":"Chapter Twelve: Two Months Old","page":{"number":100,"body":"In the morning, Mist woke first.\n\nThen Pearl woke.\n\nThen Marmalade woke because someone stepped on his tail.\n\n\"Breakfast?\" he mumbled.\n\nThe kittens tumbled toward Snowdrop, bigger than before but still bouncy, still squeaky, still full of questions.\n\n\"Why is morning pink?\" asked Pearl.\n\n\"Can shadows race?\" asked Mist.\n\nSnowdrop stood, stretched, and touched noses with them both.\n\nOutside, the garden waited.\n\nAnd Snowdrop, the white cat with bright blue eyes, was ready for whatever the kittens wondered next."},"chapter":{"label":"Chapter Twelve","title":"Two Months Old","startPage":91,"scene":{"image":"two-months.png","title":"Two Months Old","caption":"Mist and Pearl are bigger, kinder, and still full of questions."},"displayTitle":"Chapter Twelve: Two Months Old"},"chapterStart":false},"right":{"type":"back-cover","label":"About This Story","title":"Mist, Pearl, and Snowdrop","copy":"Book One begins in a lavender garden with Snowdrop, a quiet white cat with very bright blue eyes. At dawn, she expects an ordinary day with Marmalade, Pepper, Poppy, and Clover. But by noon, Snowdrop's sister Frost arrives with two three-week-old kittens: Mist, a gray and white kitten with amber eyes, and Pearl, a white kitten with green eyes.\n\nNow Snowdrop has a big job. She must care for Mist and Pearl until they are two months old, keeping them warm, safe, happy, and out of trouble while they wobble, pounce, squeak, chase leaves, discover puddles, ask endless questions, and grow into steadier paws. A cat story about caring for two kittens."}}];
    const COVER_SPREAD_INDEX = 0;
    const TURN_DURATION_MS = 180;
    const PHONE_PAGE_QUERY = '(max-width: 640px)';
    const phonePageMedia = window.matchMedia(PHONE_PAGE_QUERY);
    const singlePages = buildSinglePages(spreads);
    let current = COVER_SPREAD_INDEX;
    let currentSinglePage = firstSinglePageForSpread(current);
    let singlePageMode = isSinglePageMode();
    let locked = false;

    const book = document.getElementById('book');
    const leftPage = document.getElementById('left-page');
    const rightPage = document.getElementById('right-page');
    const turnSheet = document.getElementById('turn-sheet');
    const turnFront = document.getElementById('turn-front');
    const turnBack = document.getElementById('turn-back');
    const prevButton = document.getElementById('prev');
    const nextButton = document.getElementById('next');
    const printButton = document.getElementById('print');
    const spreadLabel = document.getElementById('spread-label');
    const progress = document.getElementById('progress');
    const pageStatus = document.getElementById('page-status');
    const printBook = document.getElementById('print-book');

    function pageClass(page) {
      if (!page || page.type === 'blank') return 'blank-page';
      if (page.type === 'cover') return 'cover-surface';
      if (page.type === 'back-cover') return 'story-page back-cover-page';
      if (page.type === 'illustration') return 'art-page';
      return 'story-page';
    }

    function pageMarkup(page) {
      if (!page || page.type === 'blank') return '<section class="blank-page-inner" aria-hidden="true"></section>';
      if (page.type === 'cover') return coverSheetMarkup(page);
      if (page.type === 'back-cover') return backCoverMarkup(page);
      if (page.type === 'toc') return tocMarkup(page);
      if (page.type === 'illustration') return artMarkup(page);
      return storyMarkup(page);
    }

    function coverSheetMarkup(page) {
      return [
        '<section class="cover-sheet" aria-label="' + escapeHtml(page.scene.title) + '">',
        '<div class="cover-sheet-art">',
        '<img src="book-assets/generated/' + page.scene.image + '" alt="' + escapeHtml(page.scene.caption) + '">',
        '</div>',
        '<div class="cover-sheet-title">',
        '<p class="front-kicker">' + escapeHtml(page.seriesLabel) + '</p>',
        '<h2>' + escapeHtml(page.scene.title) + '</h2>',
        '<p>' + escapeHtml(page.scene.caption) + '</p>',
        '</div>',
        '</section>'
      ].join('');
    }

    function backCoverMarkup(page) {
      return [
        '<section class="back-cover-content">',
        '<p class="front-kicker">About This Story</p>',
        '<h2>' + escapeHtml(page.title) + '</h2>',
        '<div class="front-copy" data-fit-story data-fit-base="16">',
        markdownParagraphs(page.copy),
        '</div>',
        '</section>'
      ].join('');
    }

    function tocMarkup(page) {
      return [
        '<section class="toc-page">',
        '<div class="toc-heading">',
        '<h2>Table of Contents</h2>',
        '<p>' + escapeHtml(page.tocIntro) + '</p>',
        '</div>',
        '<ol class="toc-list" data-fit-story data-fit-base="16">',
        page.tocEntries.map((entry) => [
          '<li>',
          '<a class="toc-link" href="#page-' + entry.pageNumber + '" data-page-number="' + entry.pageNumber + '" aria-label="' + escapeHtml(entry.title + ', page ' + entry.pageNumber) + '">',
          '<span class="toc-name">' + escapeHtml(entry.title) + '</span>',
          '<span class="toc-page-num">' + entry.pageNumber + '</span>',
          '</a>',
          '</li>'
        ].join('')).join(''),
        '</ol>',
        '</section>'
      ].join('');
    }

    function storyMarkup(storyPage) {
      const page = storyPage.page;
      return [
        chapterHeadingMarkup(storyPage),
        '<div class="story-content" data-fit-story data-fit-base="18">',
        markdownParagraphs(page.body),
        '</div>',
        '<span class="page-num">' + page.number + '</span>'
      ].join('');
    }

    function chapterHeadingMarkup(storyPage) {
      if (!storyPage.chapterStart) return '';
      return [
        '<header class="chapter-heading">',
        '<p class="chapter-kicker">' + escapeHtml(storyPage.chapter.label) + '</p>',
        '<h2>' + escapeHtml(storyPage.chapter.title) + '</h2>',
        '</header>'
      ].join('');
    }

    function artMarkup(page) {
      const scene = page.scene;
      return [
        '<div class="art-frame">',
        '<img src="book-assets/generated/' + scene.image + '" alt="' + escapeHtml(scene.title + '. ' + scene.caption) + '">',
        '</div>',
        '<div class="art-caption">',
        '<h2>' + escapeHtml(scene.title) + '</h2>',
        '<p>' + escapeHtml(scene.caption) + '</p>',
        '</div>'
      ].join('');
    }

    function applyPage(pageElement, page, sideClass) {
      pageElement.hidden = false;
      pageElement.className = 'book-page ' + sideClass + ' ' + pageClass(page);
      pageElement.innerHTML = pageMarkup(page);
      pageElement.tabIndex = 0;
      pageElement.setAttribute('aria-hidden', 'false');
    }

    function buildPrintBook() {
      printBook.innerHTML = singlePages
        .filter((entry) => entry.page && entry.page.type !== 'blank')
        .map((entry, index) => [
          '<article class="print-page ' + pageClass(entry.page) + ' print-page-' + escapeHtml(entry.page.type) + '" aria-label="' + escapeHtml(printPageLabel(entry, index)) + '">',
          pageMarkup(entry.page),
          '</article>'
        ].join(''))
        .join('');
    }

    function printPageLabel(entry, index) {
      const page = entry.page;
      if (page.type === 'cover') return 'Printable front cover';
      if (page.type === 'toc') return 'Printable table of contents';
      if (page.type === 'illustration') return 'Printable illustration, ' + page.scene.title;
      if (page.type === 'back-cover') return 'Printable back cover';
      if (page.type === 'story') return 'Printable story page ' + page.page.number;
      return 'Printable book page ' + (index + 1);
    }

    function render() {
      book.classList.toggle('single-page-mode', singlePageMode);
      if (singlePageMode) {
        renderSinglePage();
        return;
      }

      renderSpread();
    }

    function renderSpread() {
      const spread = spreads[current];
      const isCover = spread.type === 'cover';
      book.classList.toggle('cover-mode', isCover);

      if (isCover) {
        leftPage.hidden = true;
        leftPage.tabIndex = -1;
        leftPage.setAttribute('aria-hidden', 'true');
        leftPage.innerHTML = '';
        applyPage(rightPage, spread.right, 'right-page');
        rightPage.setAttribute('aria-label', 'Open book');
      } else {
        applyPage(leftPage, spread.left, 'left-page');
        applyPage(rightPage, spread.right, 'right-page');
        rightPage.setAttribute('aria-label', 'Next page');
      }

      spreadLabel.textContent = isCover ? '' : spread.label;
      pageStatus.textContent = isCover ? 'Showing front cover' : 'Showing ' + spread.label;
      prevButton.disabled = current === 0;
      nextButton.disabled = current === spreads.length - 1;
      progress.style.width = (((current + 1) / spreads.length) * 100) + '%';
      fitStoryPages(leftPage);
      fitStoryPages(rightPage);
    }

    function renderSinglePage() {
      const entry = singlePages[currentSinglePage] ?? singlePages[0];
      const isCover = entry.page.type === 'cover';

      book.classList.toggle('cover-mode', isCover);
      leftPage.hidden = true;
      leftPage.tabIndex = -1;
      leftPage.setAttribute('aria-hidden', 'true');
      leftPage.innerHTML = '';
      applyPage(rightPage, entry.page, 'right-page');
      rightPage.setAttribute('aria-label', currentSinglePage === singlePages.length - 1 ? 'Last page' : 'Next page');

      spreadLabel.textContent = entry.label;
      pageStatus.textContent = entry.status;
      prevButton.disabled = currentSinglePage === 0;
      nextButton.disabled = currentSinglePage === singlePages.length - 1;
      progress.style.width = (((currentSinglePage + 1) / singlePages.length) * 100) + '%';
      fitStoryPages(rightPage);
    }

    function turn(delta) {
      if (locked) return;
      if (singlePageMode) {
        turnSinglePage(delta);
        return;
      }

      const next = current + delta;
      if (next < 0 || next >= spreads.length) return;

      locked = true;
      turnTo(next, delta);
    }

    function turnSinglePage(delta) {
      const next = currentSinglePage + delta;
      if (next < 0 || next >= singlePages.length) return;

      locked = true;
      turnSinglePageTo(next, delta);
    }

    function turnTo(next, direction) {
      const currentSpread = spreads[current];
      const nextSpread = spreads[next];

      animateTurn({
        direction,
        frontPage: direction > 0 ? currentSpread.right : currentSpread.left,
        backPage: direction > 0 ? nextSpread.left : nextSpread.right,
        onComplete: () => {
          current = next;
          currentSinglePage = firstSinglePageForSpread(current);
        },
      });
    }

    function turnSinglePageTo(next, direction) {
      const currentEntry = singlePages[currentSinglePage];
      const nextEntry = singlePages[next];

      animateTurn({
        direction,
        frontPage: currentEntry.page,
        backPage: nextEntry.page,
        onComplete: () => {
          currentSinglePage = next;
          current = nextEntry.spreadIndex;
        },
      });
    }

    function animateTurn({ direction, frontPage, backPage, onComplete }) {
      locked = true;
      book.classList.add(direction > 0 ? 'turning-next' : 'turning-prev');
      turnSheet.className = 'turn-sheet active ' + (direction > 0 ? 'next' : 'prev');
      setTurnFace(turnFront, 'turn-front', frontPage);
      setTurnFace(turnBack, 'turn-back', backPage);
      fitStoryPages(turnSheet);

      window.setTimeout(() => {
        onComplete();
        render();
        resetTurnSheet();
        locked = false;
      }, TURN_DURATION_MS);
    }

    function resetTurnSheet() {
      book.classList.remove('turning-next', 'turning-prev');
      turnSheet.className = 'turn-sheet';
      turnFront.className = 'turn-face turn-front';
      turnBack.className = 'turn-face turn-back';
      turnFront.innerHTML = '';
      turnBack.innerHTML = '';
    }

    function setTurnFace(face, baseClass, page) {
      face.className = 'turn-face ' + baseClass + ' ' + pageClass(page);
      face.innerHTML = pageMarkup(page);
    }

    function jumpToStoryPage(pageNumber) {
      if (locked) return;

      if (singlePageMode) {
        const next = findSinglePageForStoryPage(pageNumber);
        if (next < 0) return;
        if (next === currentSinglePage) return;
        turnSinglePageTo(next, next > currentSinglePage ? 1 : -1);
        return;
      }

      const next = findSpreadForStoryPage(pageNumber);
      if (next < 0 || next === current) return;
      turnTo(next, next > current ? 1 : -1);
    }

    function findSinglePageForStoryPage(pageNumber) {
      return singlePages.findIndex((entry) => entry.page?.type === 'story' && entry.page.page.number === pageNumber);
    }

    function findSpreadForStoryPage(pageNumber) {
      return spreads.findIndex((spread) => {
        if (spread.type === 'cover') return false;
        return [spread.left, spread.right].some((page) => page?.type === 'story' && page.page.number === pageNumber);
      });
    }

    function fitStoryPages(root) {
      root.querySelectorAll('[data-fit-story]').forEach((content) => {
        const baseSize = Number(content.getAttribute('data-fit-base')) || 18;
        content.style.setProperty('--story-font-size', baseSize + 'px');
        let size = baseSize;
        while (content.scrollHeight > content.clientHeight && size > 11) {
          size -= 0.5;
          content.style.setProperty('--story-font-size', size + 'px');
        }
      });
    }

    function buildSinglePages(sourceSpreads) {
      const pages = [];
      sourceSpreads.forEach((spread, spreadIndex) => {
        if (spread.type === 'cover') {
          pages.push(singlePageEntry(spread.right, spreadIndex, ''));
          return;
        }

        [spread.left, spread.right].forEach((page) => {
          if (!page || page.type === 'blank') return;
          pages.push(singlePageEntry(page, spreadIndex, spread.label));
        });
      });
      return pages;
    }

    function singlePageEntry(page, spreadIndex, spreadLabelText) {
      const label = singlePageLabel(page, spreadLabelText);
      return {
        page,
        spreadIndex,
        label,
        status: label ? 'Showing ' + label : 'Showing front cover',
      };
    }

    function singlePageLabel(page, spreadLabelText) {
      if (!page || page.type === 'cover') return '';
      if (page.type === 'toc') return 'Table of Contents';
      if (page.type === 'back-cover') return 'About This Story';
      if (page.type === 'illustration') return page.scene.title;
      if (page.type === 'story') return spreadLabelText;
      return spreadLabelText;
    }

    function firstSinglePageForSpread(spreadIndex) {
      const pageIndex = singlePages.findIndex((entry) => entry.spreadIndex === spreadIndex);
      return pageIndex < 0 ? 0 : pageIndex;
    }

    function isSinglePageMode() {
      return phonePageMedia.matches;
    }

    function syncReaderMode() {
      const nextMode = isSinglePageMode();
      if (nextMode === singlePageMode) return false;

      if (nextMode) {
        currentSinglePage = firstSinglePageForSpread(current);
      } else {
        current = singlePages[currentSinglePage]?.spreadIndex ?? current;
      }

      singlePageMode = nextMode;
      locked = false;
      resetTurnSheet();
      return true;
    }

    function markdownParagraphs(markdown) {
      return markdown
        .split(/\n{2,}/)
        .map((paragraph) => paragraph.trim())
        .filter(Boolean)
        .map((paragraph) => '<p>' + inlineMarkdown(paragraph) + '</p>')
        .join('');
    }

    function inlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    if (window.location.hash) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    function handlePageClick(event, direction) {
      const tocLink = event.target.closest('[data-page-number]');
      if (tocLink) {
        event.preventDefault();
        event.stopPropagation();
        jumpToStoryPage(Number(tocLink.dataset.pageNumber));
        return;
      }
      turn(direction);
    }

    function handlePrint() {
      buildPrintBook();
      window.print();
    }

    nextButton.addEventListener('click', () => turn(1));
    prevButton.addEventListener('click', () => turn(-1));
    printButton.addEventListener('click', handlePrint);
    rightPage.addEventListener('click', (event) => handlePageClick(event, 1));
    leftPage.addEventListener('click', (event) => handlePageClick(event, -1));
    rightPage.addEventListener('keydown', (event) => {
      if (event.target.closest('[data-page-number]')) return;
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        turn(1);
      }
    });
    leftPage.addEventListener('keydown', (event) => {
      if (event.target.closest('[data-page-number]')) return;
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        turn(-1);
      }
    });
    document.addEventListener('keydown', (event) => {
      if (event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return;
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        turn(1);
      }
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        turn(-1);
      }
    });
    function handleViewportChange() {
      if (syncReaderMode()) {
        render();
        return;
      }

      fitStoryPages(leftPage);
      fitStoryPages(rightPage);
    }

    phonePageMedia.addEventListener('change', handleViewportChange);
    window.addEventListener('resize', handleViewportChange);
    window.addEventListener('beforeprint', buildPrintBook);

    buildPrintBook();
    render();
  </script>
</body>
</html>
